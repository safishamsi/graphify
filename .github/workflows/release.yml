name: Release Standalone Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UPX (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get install -y upx

      - name: Install UPX (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install upx

      - name: Install UPX (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .[all]

      - name: Build with PyInstaller
        run: |
          pyinstaller graphify.spec

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist/upload
          # Use tag name or 'latest' for archive naming
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ $VERSION == refs/push/* || $VERSION == workflow_dispatch ]]; then VERSION="latest"; fi
          
          cp README-standalone.md dist/README.md
          
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/graphify.exe dist/graphify-windows.exe
            cd dist && zip "upload/graphify-${VERSION}-windows.zip" graphify-windows.exe README.md
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            cd dist && tar -czf "upload/graphify-${VERSION}-macos.tar.gz" graphify README.md
          else
            cd dist && tar -czf "upload/graphify-${VERSION}-linux.tar.gz" graphify README.md
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphify-${{ matrix.os }}
          path: dist/upload/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/all
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/all/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
