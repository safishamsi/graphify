name: Release Standalone Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .[all]

      - name: Build with PyInstaller
        run: |
          pyinstaller graphify.spec

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist/upload
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/graphify.exe dist/upload/graphify-windows.exe
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            mv dist/graphify dist/upload/graphify-macos
          else
            mv dist/graphify dist/upload/graphify-linux
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: graphify-${{ matrix.os }}
          path: dist/upload/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/all
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/all/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
