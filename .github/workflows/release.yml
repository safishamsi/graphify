name: Release Standalone Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .[all]

      - name: Build with PyInstaller
        run: |
          pyinstaller graphify.spec

      - name: Prepare Binary
        shell: bash
        run: |
          mkdir -p dist/upload
          # Use tag name or 'latest' for archive naming
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ $VERSION == refs/push/* || $VERSION == workflow_dispatch ]]; then VERSION="latest"; fi
          
          cp README-standalone.md dist/README.md
          
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv dist/aag.exe dist/aag-windows.exe
            powershell.exe -Command "Compress-Archive -Path 'dist/aag-windows.exe', 'dist/README.md' -DestinationPath 'dist/upload/aag-${VERSION}-windows.zip' -Force"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            cd dist && tar -czf "upload/aag-${VERSION}-macos.tar.gz" aag README.md
          else
            cd dist && tar -czf "upload/aag-${VERSION}-linux.tar.gz" aag README.md
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aag-${{ matrix.os }}
          path: dist/upload/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup old assets
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Cleaning up old assets for release $TAG"
          
          # Ensure the release exists so we can query it
          gh release view "$TAG" || gh release create "$TAG" --draft --title "$TAG"
          
          # List all assets and delete them
          gh release view "$TAG" --json assets --template '{{range .assets}}{{.name}}{{"\n"}}{{end}}' | \
          while read -r asset; do
            if [ -n "$asset" ]; then
              echo "Deleting old asset: $asset"
              gh release delete-asset "$TAG" "$asset" --yes || true
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/all
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/all/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
