name: CI

on:
  push:
    branches: ["v1", "v2", "v3", "main"]
  pull_request:
    branches: ["v1", "v2", "v3", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked --extra mcp --extra pdf --extra watch

      - name: Run tests
        run: uv run --locked python -m pytest tests/ -q --tb=short

      - name: Verify install works end-to-end
        run: |
          uv run --locked graphify --help
          uv run --locked graphify install
